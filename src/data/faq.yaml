title: FAQ

questions:
  - question: When is the RSVP deadline?
    answer: Let us know by <strong>October 5th, 2026</strong> so we have enough time to finalize headcount in advance.
    tooltipColor: pink_soft

  - question: What's the dress code?
    answer: As befits the location, we’re leaning into an elegant island vibe. Think “White Lotus” style. Lightweight linens, breezy dresses, and tropical resort wear.
    imagesGalleryAlt: Dress code inspiration — tropical resort and evening wear
