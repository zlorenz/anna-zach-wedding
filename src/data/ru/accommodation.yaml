intro:
  pageTitle: Проживание
  copy: |
    На свадебные выходные есть много хороших вариантов. Проще всего остановиться в отеле на острове Хон Тре, где проходит свадьба: там же все основные мероприятия. Если хотите остановиться в городе на материке, ниже рекомендуемые отели в Нячанге и карта с маршрутом до площадки.

featured:
  eyebrow: Основная рекомендация
  title: Nha Trang Marriott, остров Хон Тре
  tagline: Самый простой вариант на выходные.
  reasons:
    - Здесь проходят все основные мероприятия, логистика проще всего
    - Удобно, если хотите быть рядом с другими гостями без лишних переездов
    - Идеально для коротких свадебных выходных с минимумом планирования
  bookLabel: Забронировать отель
  bookUrl: https://maps.app.goo.gl/kpG5MYX2LGKW8xFM8
  note: Ближе к дате можем поделиться групповым бронированием или инструкциями. Пока можно смотреть тарифы на сайте отеля.

picks:
  title: Рекомендуемые отели

airbnb:
  heading: Апартаменты и Airbnb
  copy: |
    Airbnb или апартаменты хорошо подходят для длительных поездок, семей или компаний. На короткие свадебные выходные отели обычно удобнее: проще с транспортом на остров, временем и общением с другими гостями.
