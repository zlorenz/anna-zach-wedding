intro:
  pageTitle: Проживание
  copy: |
    На свадебные выходные есть много хороших вариантов. Проще всего остановиться в отеле, где проходит свадьба — там же все основные мероприятия. Если хотите другой вариант, ниже — несколько альтернатив рядом и карта отелей.

featured:
  eyebrow: Основная рекомендация
  title: Nha Trang Marriott Resort & Spa, Hon Tre Island
  tagline: Самый простой вариант на выходные.
  reasons:
    - Здесь проходят основные мероприятия — логистика проще всего
    - Удобно, если хотите быть рядом с другими гостями без лишних переездов
    - Идеально для коротких свадебных выходных с минимумом планирования
  bookLabel: Забронировать отель
  bookUrl: https://maps.app.goo.gl/kpG5MYX2LGKW8xFM8
  note: Ближе к дате можем поделиться блоком номеров или инструкциями. Пока можно смотреть тарифы на сайте отеля.

picks:
  title: Быстрый выбор

airbnb:
  heading: Апартаменты и Airbnb
  copy: |
    Airbnb или апартаменты хорошо подходят для длительных поездок, семей или компаний. На короткие свадебные выходные отели обычно удобнее — проще с транспортом, временем и общением с другими гостями.
