title: Вопросы и ответы

questions:
  - question: До какого числа нужно ответить на приглашение?
    answer: Пожалуйста, сообщите нам до <strong>5 октября 2026 года</strong>, чтобы мы успели уточнить количество гостей заранее.
    tooltipColor: pink_soft

  - question: Какой дресс-код?
    answer: В духе места, элегантный островной стиль. Лёгкий лён, воздушные платья, рубашки без галстука. Курортный образ без строгого костюма; для вдохновения можно вспомнить «Белый лотос».
    imagesGalleryAlt: Примеры дресс-кода, курортная и вечерняя одежда
    images:
      - file: images/faq/dress-code-women-01.png
        alt: Женская курортная и вечерняя одежда
      - file: images/faq/dress-code-women-02.png
        alt: Вдохновение для женского дресс-кода
      - file: images/faq/dress-code-men-01.png
        alt: Мужская курортная одежда
      - file: images/faq/dress-code-men-02.png
        alt: Вдохновение для мужского дресс-кода
    tooltipColor: blue_mist

  - question: Как добраться до места проведения свадьбы?
    answer: Свадьба пройдёт в Nha Trang Marriott на острове Хон Тре, у побережья Нячанга. Гости, остановившиеся в городе, добираются через терминал Vinpearl, затем короткая поездка на канатной дороге или пароме и бесплатный шаттл отеля. После прибытия всё очень просто и удобно.
    tooltipColor: pink_soft

  - question: Во сколько нужно прийти на церемонию?
    answer: Церемония начнётся в 16:00. Рекомендуем приехать как минимум за 30 минут — чтобы спокойно устроиться и найти место.
    tooltipColor: blue_mist

  - question: Во сколько закончится банкет?
    answer: Банкет завершится около 21:30. Для тех, кто хочет продолжить вечер, after-party начнётся в 22:00 в нашей вилле. Все приглашены — учтите, что эта часть вечера только для взрослых.
    tooltipColor: pink_soft

  - question: Будет ли открытый бар?
    answer: Конечно. Полный открытый бар с безалкогольными напитками, пивом, вином и крепкими на коктейль-часе и в течение всего банкета.
    tooltipColor: blue_mist

  - question: Можно ли прийти с парой?
    answer: Да, можно прийти с гостем (+1). Просим только разумно подходить к количеству. Обязательно укажите всех дополнительных гостей в ответе на приглашение вместе с диетическими ограничениями.
    tooltipColor: pink_soft

  - question: Можно ли приводить детей?
    answer: Да, дети более чем приветствуются. Пожалуйста, укажите их в ответе на приглашение, чтобы мы могли точно посчитать гостей. Надеемся, что поездка станет для всей семьи приятным пляжным отдыхом!
    tooltipColor: blue_mist

  - question: Будет ли встреча после свадьбы?
    answer: Да, на следующий день после свадьбы мы устраиваем неформальную встречу на нашей вилле. Заходите в любое время с 12:00 до 16:00 — без расписания, просто пообщаться и провести ещё немного времени вместе перед отъездом.
    tooltipColor: pink_soft

  - question: Когда бронировать перелёт и проживание?
    answer: Есть несколько вариантов, все зависит от вашей любви к планированию и бюджета. Подробности в разделах <a href="/ru/travel/">«Как добраться»</a> и <a href="/ru/accomodation/">«Проживание»</a>.
    tooltipColor: blue_mist

  - question: На сколько дней лучше приехать?
    answer: |
      Мы сами будем в Нячанге с 2 по 7 декабря. Минимум: приехать 4 декабря (накануне свадьбы) и остаться до 7-го, чтобы спокойно насладиться свадебными выходными.

      Если летите из России или другой страны, подумайте о более длинном отпуске. Вьетнам удивительная страна, и мы будем рады, если вы увидите больше, чем только Нячанг. Хошимин и Ханой того стоят. Декабрь в Нячанге популярен у туристов, так что на выходные город оживлённый.
    tooltipColor: pink_soft

  - question: Нужна ли виза во Вьетнам?
    answer: Граждане России могут въезжать во Вьетнам без визы до 45 дней для туризма и кратких поездок. С другим паспортом заранее проверьте требования онлайн, в том числе если летите из Беларуси, Украины или другой страны. Подробности на странице <a href="/ru/travel/">«Как добраться»</a>.
    tooltipColor: blue_mist

  - question: Какая погода в декабре?
    answer: |
      К декабрю сезон дождей в Нячанге обычно заканчивается — надеемся на солнечную погоду.

      Тем не менее кратковременные ливни возможны, так что готовьтесь к жаре, влажности и шансу дождя. Лёгкая одежда, сандалии и небольшой дождевик — всё, что нужно.
    tooltipColor: pink_soft

  - question: Как лучше добраться от аэропорта до отеля?
    answer: "Рекомендуем приложения Grab или «Максим». Оплата наличными российские карты не работают. Подробнее — в разделе <a href=\"/ru/travel/\">«Как добраться»</a>."
    tooltipColor: blue_mist

  - question: Можно ли расплачиваться картой или лучше наличные?
    answer: |
      Российские карты во Вьетнаме не работают, но во многих местах можно расплатиться по QR из приложения Сбербанка. А в банкоматах банка VRB даже снять деньги с карты МИР.

      Можете не брать большую сумму в долларах из России, а на месте обменять рубли переводом на карту — наличные донги вам привезут прямо к отелю. Подробнее в разделе <a href="/ru/travel/">«Как добраться»</a>.
    tooltipColor: pink_soft

  - question: Как подключить мобильный интернет?
    answer: Проще всего оформить eSIM до поездки. На странице <a href="/ru/travel/">«Как добраться»</a> есть варианты с оплатой «Мир» и СБП. Можно купить местную SIM в аэропорту или в городе, но заранее настроенная eSIM обычно надёжнее.
    tooltipColor: blue_mist
