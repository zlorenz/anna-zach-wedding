airport:
  titleLines:
    - Аэропорт
    - прибытия
  leadHtml: |
    <p>Если вы летите самолётом, вы приземлитесь в международном аэропорту Камрань (CRX), в 40 км к югу от Нячанга. Из России удобны прямые чартеры в Камрань или рейсы с пересадкой в Хошимине, Дубае, Стамбуле или Бангкоке. Зимой прямых рейсов бывает больше, но билеты лучше бронировать заранее.</p>

transfer:
  title: Дорога до Нячанга
  bodyHtml: |
    <p>Добраться от аэропорта до Нячанга просто, обычно меньше часа в зависимости от отеля.</p>
    <p>Остерегайтесь мошенников в аэропорту. Не берите местные такси и не садитесь к тем, кто предлагает поездку у терминала: цены всегда завышенные.</p>
    <p>Рекомендуем заказывать поездку через Grab или приложение «Максим». Видно номер машины и цена заранее. Скачайте и зарегистрируйтесь до вылета, подойдёт российский номер телефона. Оплата обычно наличными в донгах. Российские Visa и Mastercard, как правило, не работают.</p>
    <p><a class="az-travel__button" href="https://www.grab.com/global/download/" target="_blank" rel="noopener noreferrer">Скачать Grab</a> <a class="az-travel__button" href="https://taximaxim.com/vn/ru/app/" target="_blank" rel="noopener noreferrer">Скачать «Максим»</a></p>

essentials:
  eyebrow: Важное
  title: Всё, что нужно знать перед поездкой.
  visa:
    title: Виза
    bodyHtml: |
      <p>Граждане России могут въезжать во Вьетнам без визы до 45 дней для туризма и кратких деловых поездок. Для свадебных выходных этого достаточно.</p>
      <p>Нужен загранпаспорт со сроком не менее 6 месяцев после въезда. С другим паспортом заранее проверьте онлайн, нужна ли виза. При необходимости eVisa оформляют на <a href="https://evisa.gov.vn/" target="_blank" rel="noopener noreferrer">evisa.gov.vn</a>. Подавайте заявку минимум за 2 недели до вылета.</p>
    callout:
      icon: plane
      title: Совет
      body: "Загранпаспорт должен быть действителен ещё 6 месяцев после въезда. Обратный билет держите при себе: могут попросить при регистрации или на границе."
  sim:
    title: SIM-карты
    bodyHtml: |
      <p>Связь во Вьетнаме проста. Рекомендуем eSIM и настройте всё ещё до приземления. Airalo с российскими картами часто не проходит. Удобнее Yesim, Unisim или МТС: оплата «Мир» или СБП. Берите пакет с фиксированным трафиком, не «безлимит». Скорость быстро падает.</p>
    buttonLabel: Оформить eSIM в Yesim
    buttonUrl: https://yesim.app/
  currency:
    title: Валюта и оплата
    bodyHtml: |
      <p>Во Вьетнаме платят вьетнамскими донгами (VND), рубли не принимают. Российские карты Visa и Mastercard за границей, как правило, не работают. Удобные варианты: оплата по QR через приложение банка, карта UnionPay (если есть) или наличные. Для рынков и уличной еды наличные всё равно пригодятся.</p>
      <p>С вьетнамским донгом (VND) цены поначалу сбивают с толку, столько нулей! Не удивляйтесь, если обед стоит «миллион». Это примерно 3 000 рублей.</p>
    exchangeLabel: Курс
    exchangeValue: 100 ₽ ≈ 35 000 VND
