airport:
  titleLines:
    - Аэропорт
    - прибытия
  leadHtml: |
    <p>Если вы летите прямо в Нячанг, вы приземлитесь в аэропорту Камрань (CXR), в 40 км к югу от Нячанга. Можно купить заранее прямые рейсы у «Аэрофлота» (дорого), рейсы с пересадкой в Китае (дешевле) или горящие чартеры, которые продают очень дешево ближе к дате вылета.</p>
    <p>Найти билеты на чартеры можно в телеграм-каналах: <a href="https://t.me/chartervietnam" target="_blank" rel="noopener noreferrer">один</a>, <a href="https://t.me/ticketvietnam" target="_blank" rel="noopener noreferrer">два</a>. Или посмотрите туры — они могут быть еще выгоднее, чем покупать билеты и бронировать жилье отдельно.</p>

transfer:
  title: Дорога до Нячанга
  bodyHtml: |
    <p>Дорога от аэропорта на такси занимает обычно меньше часа в зависимости от отеля. Стоимость такси — от 300к до 500к донгов, зависит от спроса и удаленности отеля. Прямо на выходе из аэропорта можно сесть на комфортный автобус за 70к.</p>
    <p>Остерегайтесь мошенников в аэропорту и обговаривайте цену на такси до начала поездки.</p>
    <p>Приложения для вызова такси: Grab, «Максим» (дешевле) или InDriver (сами задаете цену). Оплатить можно наличными. Российские Visa и Mastercard не работают.</p>
    <p><a class="az-travel__button" href="https://www.grab.com/global/download/" target="_blank" rel="noopener noreferrer">Скачать Grab</a> <a class="az-travel__button" href="https://taximaxim.com/vn/ru/app/" target="_blank" rel="noopener noreferrer">Скачать «Максим»</a></p>

essentials:
  eyebrow: Важное
  title: Всё, что нужно знать перед поездкой.
  visa:
    title: Виза
    bodyHtml: |
      <p>Граждане России могут въезжать во Вьетнам без визы до 45 дней для туризма и кратких деловых поездок. Для свадебных выходных этого достаточно.</p>
      <p>Нужен загранпаспорт со сроком не менее 6 месяцев после въезда. С другим паспортом заранее проверьте онлайн, нужна ли виза. При необходимости eVisa оформляют на <a href="https://evisa.gov.vn/" target="_blank" rel="noopener noreferrer">evisa.gov.vn</a>. Подавайте заявку минимум за 2 недели до вылета.</p>
    callout:
      icon: plane
      title: Совет
      body: "Загранпаспорт должен быть действителен ещё 6 месяцев после въезда. Обратный билет держите при себе: могут попросить при регистрации или на границе."
  sim:
    title: SIM-карты
    bodyHtml: |
      <p>Оформите eSIM, это намного выгоднее, чем просто включать роуминг. Купите и настройте eSIM на телефоне до поездки — подойдут Yesim, Unisim, МТС или предложения от ваших операторов.</p>
    buttonLabel: Оформить eSIM в Yesim
    buttonUrl: https://yesim.app/
  currency:
    title: Валюта и оплата
    bodyHtml: |
      <p>Во Вьетнаме не работают российские карты, но во многих местах можно расплатиться по QR-коду от Сбербанка. Чтобы по прилету взять такси, лучше обменять 50 или 100 долларов или наличные рубли в аэропорту.</p>
      <p>Заранее много денег обменивать не нужно: в городе есть менялы, которые привезут наличные прямо к отелю, а вы им переведете на карту. В банкоматах банка VRB можно снять деньги с карты МИР, но курс не очень выгодный.</p>
      <p>С вьетнамским донгом (VND) цены поначалу сбивают с толку, столько нулей! Не удивляйтесь, если обед стоит «миллион». Это примерно 3 000 рублей.</p>
    exchangeLabel: Курс
    exchangeValue: 100 ₽ ≈ 35 000 VND
