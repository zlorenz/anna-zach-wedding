airport:
  titleLines:
    - Аэропорт
    - прибытия
  leadHtml: |
    <p>Если вы летите самолётом, вы приземлитесь в международном аэропорту Камрань (CRX), в 40 км к югу от Нячанга. Из США обычно удобнее лететь через Хошимин с пересадкой на внутренний рейс в Камрань — это часто самый выгодный маршрут.</p>

transfer:
  title: Дорога до Нячанга
  bodyHtml: |
    <p>Добраться от аэропорта до Нячанга просто — обычно меньше часа, в зависимости от отеля.</p>
    <p>Остерегайтесь мошенников в аэропорту. Не берите местные такси и не садитесь к тем, кто предлагает поездку у терминала — всегда завышенные цены.</p>
    <p>Рекомендуем заказывать поездку через Grab — аналог Uber. Можно проверить номер машины. Скачайте приложение и привяжите карту до вылета.</p>
    <p><a class="az-travel__button" href="https://www.grab.com/global/download/" target="_blank" rel="noopener noreferrer">Скачать Grab</a></p>

essentials:
  eyebrow: Важное
  title: Всё, что нужно знать перед поездкой.
  visa:
    title: Виза
    bodyHtml: |
      <p>Большинству гостей для въезда во Вьетнам нужна виза. Для граждан США — простая онлайн-процедура через официальную систему eVisa. Подавайте заявку как минимум за 2 недели до вылета.</p>
      <p>После подачи вы получите письмо в течение 72 часов. Распечатайте приглашение на визу — его могут попросить при регистрации на рейс.</p>
    buttonLabel: Подать заявку на eVisa
    buttonUrl: https://evisa.gov.vn/
    callout:
      icon: plane
      title: Совет
      body: Распечатайте письмо о визе — авиакомпании часто требуют бумажную копию при посадке.
  sim:
    title: SIM-карты
    bodyHtml: |
      <p>Связь во Вьетнаме проста. Рекомендуем eSIM — всё настроено ещё до приземления. Проще всего через Airalo; выбирайте тариф Standard, не Unlimited — иначе скорость быстро снизится.</p>
    buttonLabel: Установить eSIM до вылета
    buttonUrl: http://airalo.com/
  currency:
    title: Валюта и оплата
    bodyHtml: |
      <p>С дебетовой или кредитной картой проблем обычно нет — их принимают в отелях, ресторанах и большинстве заведений. Наличные полезны для мелких магазинов и уличной еды. Банкоматы есть повсюду.</p>
      <p>С вьетнамским донгом (VND) цены поначалу сбивают с толку — столько нулей! Не удивляйтесь, если обед стоит «миллион» — это около 40 долларов.</p>
    exchangeLabel: Курс
    exchangeValue: 1 USD ≈ 26 000 VND
