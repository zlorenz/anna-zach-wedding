paragraphs:
  - |
    Два года назад Зак прилетел в Нячанг на свидание из Bumble, просто на выходные, как нам тогда казалось. Теперь мы возвращаемся: много поездок, одна квартира, два кота и предложение спустя.
  - |
    Мы так рады, что друзья и близкие приедут к нам со всего света. Спасибо, что вы с нами в этой истории и что приедете праздновать с нами в месте, которое за эти годы стало таким дорогим. Не терпится отпраздновать это вместе с вами.

signature: Anna & Zach
