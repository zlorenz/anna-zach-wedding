title: Как добраться до площадки

intro:
  - |
    На карте: место свадьбы на острове Хон Тре, терминалы Vinpearl на материке и острове, а также рекомендуемые отели в Нячанге.
  - |
    Если вы останавливаетесь на материке, маршрут простой. Терминал Vinpearl, затем канатная дорога или паром (около 10 минут), затем шаттл Marriott до отеля. От типичного отеля в городе около 30–40 минут от двери до двери. На месте указатели и персонал помогут с остальным.

legendRecommendedStays: Рекомендуемые отели
legendWeddingVenue: Место свадьбы
legendTerminal: Терминалы парома и канатной дороги
legendDriveRoute: На машине (Grab / «Максим» / такси)
legendCrossingRoute: Канатная дорога / паром
