title: Как добраться до площадки

intro:
  - |
    На карте — место свадьбы на острове Хон Тре, терминалы Vinpearl на материке и острове, а также рекомендуемые отели рядом.
  - |
    Если вы на материке, маршрут простой: терминал Vinpearl → канатная дорога или паром (около 10 минут) → шаттл Marriott до отеля. От типичного отеля в городе — 30–40 минут от двери до двери. На месте указатели и персонал помогут с остальным.

legendRecommendedStays: Рекомендуемые отели
legendWeddingVenue: Место свадьбы
legendTerminal: Терминалы парома и канатной дороги
legendDriveRoute: На машине (Grab / такси)
legendCrossingRoute: Канатная дорога / паром
