# Image slots — change `file` paths to swap photos site-wide.
# Engagement library: public/assets/photos/engagement/ (all Anna & Zach session JPGs)
# Brand logos: public/assets/brand/

slots:
  home.heroBackground:
    file: photos/engagement/20260404-NS-AZ-5222.jpg
    alt: Anna and Zach

  # Home hero on viewports ≤768px — set a portrait-friendly crop; leave file empty to reuse desktop
  home.heroBackgroundMobile:
    file: photos/engagement/20260404-NS-AZ-5164.jpg
    alt: Anna and Zach

  home.heroWordmark:
    file: brand/anna-zach-symbol-light.png
    alt: Anna & Zach

  travel.triptychLeft:
    file: photos/engagement/20260404-NS-AZ-5398.jpg
    alt: ""

  travel.triptychCenter:
    file: photos/engagement/20260404-NS-AZ-5848.jpg
    alt: ""

  travel.triptychRight:
    file: photos/engagement/20260404-NS-AZ-5689.jpg
    alt: ""

  # Travel top triptych on phones (≤991px) — left + right only; omit `file` to reuse desktop
