  travel.offsetLarge:
    file: photos/engagement/20260404-NS-AZ-5419.jpg
    alt: ""

  # Travel offset divider on phones (≤991px) — single image; omit `file` to reuse offsetLarge
  travel.offsetMobile:
    file: photos/engagement/20260404-NS-AZ-5629.jpg
    alt: ""

  accommodation.dividerLeft:
